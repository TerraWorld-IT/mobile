name: Mobile CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

# 낙서장 트랙CI(req 5): validate/android-build/android-test 3-job(npm ci ×3, cap sync ×2)을
# 단일 android job 으로 compact (npm ci/cap sync/java 1회). ios-check 는 macOS 비용상 분리 유지.
jobs:
  android:
    name: Android (validate → build → test)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 1. Validate Capacitor config (비차단 — shell `|| true` 는 UI 에 흔적이 안 남아
      #    continue-on-error 로 전환: 실패 시 주황 표시로 가시화)
      - name: Validate capacitor.config.ts
        run: npx cap doctor 2>&1
        continue-on-error: true
      - name: Check plugin versions
        run: npx cap ls 2>&1

      - name: Capacitor sync
        run: npx cap sync android

      # frontend↔mobile Capacitor 파리티 가드 — 어떤 워크플로에서도 미호출이던 orphan 스크립트
      # 배선 (2026-07-20 audit B5-4). 스크립트는 워크스페이스의 ../frontend/package.json 을
      # 읽으므로 mobile 단독 체크아웃(GITHUB_TOKEN 은 cross-repo 접근 불가)에선 skip 하고
      # 알린다 — 완전한 CI 게이트化는 org PAT 시크릿 필요(운영 결정 대기). 로컬 워크스페이스
      # 에서는 `npm run check:parity` 로 실행 가능.
      - name: Check capacitor version parity (workspace checkout only)
        run: |
          if [ -f ../frontend/package.json ]; then
            node scripts/check-capacitor-sync.mjs
          else
            echo "::notice::frontend checkout 없음 — 파리티 검사 skip (로컬: npm run check:parity)"
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # 2. Build debug APK + size guard
      - name: Build Android debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Check APK size
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          SIZE=$(stat -f%z "$APK" 2>/dev/null || stat -c%s "$APK")
          SIZE_MB=$((SIZE / 1048576))
          echo "📱 APK size: ${SIZE_MB}MB ($SIZE bytes)"
          if [ "$SIZE_MB" -gt 50 ]; then
            echo "::error::APK size exceeds 50MB (${SIZE_MB}MB). Investigate bundle bloat."
            exit 1
          fi

      # 비차단 유지하되 실패를 UI 에 가시화 (기존 `|| true` 는 무음 통과)
      - name: Android lint check
        run: cd android && ./gradlew lint
        continue-on-error: true

      # 3. Unit tests
      - name: Run unit tests
        run: cd android && ./gradlew test

      - name: Upload APK artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-report
          path: android/app/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7

  # iOS build check (main branch only, macOS runner is expensive)
  ios-check:
    name: iOS Build Check
    # macos-14 는 고정 이미지라 release.yml 의 ios-release job(macos-latest, Xcode 26 명시 선택)과
    # 툴체인이 어긋나 있었다 — 동일 커밋인데 release 는 성공, 이 job 만 CAPBridgeProtocol 관련
    # 컴파일 에러로 실패하던 원인(전수 UX 점검 후속 CI 조사에서 확인). release.yml 과 동일하게 맞춤.
    runs-on: macos-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # macOS 러너 절약 — iOS 빌드에 영향 주는 경로가 변경된 push 에만 xcodebuild 실행.
      # job 분리 대신 step-level if (최소 침습): 필터 미매치 시 이후 step 전부 skip,
      # job 자체는 green 으로 통과 (required check 호환).
      - name: Detect iOS-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ios:
              - 'ios/**'
              - 'package.json'
              - 'package-lock.json'
              - 'capacitor.config.ts'

      - name: Setup Node.js
        if: steps.filter.outputs.ios == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.filter.outputs.ios == 'true'
        run: npm ci

      # release.yml 의 ios-release job 과 동일 패턴 — Capacitor swift-pm 이 요구하는 최신 툴체인.
      - name: Select Xcode 26 (release.yml 과 동일 툴체인)
        if: steps.filter.outputs.ios == 'true'
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then
            echo "::error::Xcode 26 미설치 — 사용 가능:"; ls -d /Applications/Xcode_*.app || true; exit 1
          fi
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      # SPM 패키지 fetch 캐시 (CI-12) — Package.resolved 미커밋 상태라 Package.swift 해시 키.
      # DerivedData 캐시는 무효화 함정이 있어 제외, swiftpm fetch 캐시만.
      - name: Cache SwiftPM
        if: steps.filter.outputs.ios == 'true'
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('ios/App/CapApp-SPM/Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Capacitor sync
        if: steps.filter.outputs.ios == 'true'
        run: npx cap sync ios

      # Capacitor 8+ SPM (Podfile 없음). ios/App/CapApp-SPM/Package.swift 가 의존성 정의.
      - name: Build iOS (simulator, no signing)
        if: steps.filter.outputs.ios == 'true'
        run: |
          cd ios/App
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
