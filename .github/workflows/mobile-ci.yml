name: Mobile CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

# 낙서장 트랙CI(req 5): validate/android-build/android-test 3-job(npm ci ×3, cap sync ×2)을
# 단일 android job 으로 compact (npm ci/cap sync/java 1회). ios-check 는 macOS 비용상 분리 유지.
jobs:
  android:
    name: Android (validate → build → test)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 1. Validate Capacitor config (비차단)
      - name: Validate capacitor.config.ts
        run: npx cap doctor 2>&1 || true
      - name: Check plugin versions
        run: npx cap ls 2>&1

      - name: Capacitor sync
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # 2. Build debug APK + size guard
      - name: Build Android debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Check APK size
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          SIZE=$(stat -f%z "$APK" 2>/dev/null || stat -c%s "$APK")
          SIZE_MB=$((SIZE / 1048576))
          echo "📱 APK size: ${SIZE_MB}MB ($SIZE bytes)"
          if [ "$SIZE_MB" -gt 50 ]; then
            echo "::error::APK size exceeds 50MB (${SIZE_MB}MB). Investigate bundle bloat."
            exit 1
          fi

      - name: Android lint check
        run: cd android && ./gradlew lint || true

      # 3. Unit tests
      - name: Run unit tests
        run: cd android && ./gradlew test

      - name: Upload APK artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-report
          path: android/app/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7

  # iOS build check (main branch only, macOS runner is expensive)
  ios-check:
    name: iOS Build Check
    # macos-14 는 고정 이미지라 release.yml 의 ios-release job(macos-latest, Xcode 26 명시 선택)과
    # 툴체인이 어긋나 있었다 — 동일 커밋인데 release 는 성공, 이 job 만 CAPBridgeProtocol 관련
    # 컴파일 에러로 실패하던 원인(전수 UX 점검 후속 CI 조사에서 확인). release.yml 과 동일하게 맞춤.
    runs-on: macos-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # release.yml 의 ios-release job 과 동일 패턴 — Capacitor swift-pm 이 요구하는 최신 툴체인.
      - name: Select Xcode 26 (release.yml 과 동일 툴체인)
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then
            echo "::error::Xcode 26 미설치 — 사용 가능:"; ls -d /Applications/Xcode_*.app || true; exit 1
          fi
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      - name: Capacitor sync
        run: npx cap sync ios

      # Capacitor 8+ SPM (Podfile 없음). ios/App/CapApp-SPM/Package.swift 가 의존성 정의.
      - name: Build iOS (simulator, no signing)
        run: |
          cd ios/App
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
