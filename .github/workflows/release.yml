name: Mobile Release Build

# tag 가 v* 형식으로 push 되거나 수동 트리거 시 실행.
# Play Console 비공개 테스트 / 프로덕션 검수에 업로드할 서명 AAB 를 생성한다.
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   — `base64 -w0 terraworld-release.keystore` 결과
#   ANDROID_KEYSTORE_PASSWORD — keystore 비밀번호
#   ANDROID_KEY_ALIAS         — 키 alias (예: terraworld)
#   ANDROID_KEY_PASSWORD      — 키 비밀번호
#
# Secrets 가 없으면 unsigned AAB 만 생성됨 (Play Store 업로드 불가).
# android/app/build.gradle 의 release buildType 에 signingConfig 도 설정되어 있어야 한다.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (선택)'
        required: false

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Android Release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capacitor sync
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Check if keystore secret is configured
        id: keystore_check
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret 이 없어 unsigned AAB 만 생성됩니다."
          fi

      - name: Decode signing keystore
        if: steps.keystore_check.outputs.has_keystore == 'true'
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore/release.keystore
          {
            echo "ANDROID_KEYSTORE_FILE=keystore/release.keystore"
            echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } >> "$GITHUB_ENV"

      - name: Build release AAB
        run: cd android && ./gradlew bundleRelease

      - name: Locate AAB
        id: locate_aab
        run: |
          AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "aab_path=$AAB" >> "$GITHUB_OUTPUT"
          ls -lh "$AAB"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: ${{ steps.locate_aab.outputs.aab_path }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate_aab.outputs.aab_path }}
          body: ${{ github.event.inputs.release_notes }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
