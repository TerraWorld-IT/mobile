name: Mobile Release Build

# tag 가 v* 형식으로 push 되거나 수동 트리거 시 실행.
# Play Console 비공개 테스트 / 프로덕션 검수에 업로드할 서명 AAB 를 생성한다.
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   — `base64 -w0 terraworld-release.keystore` 결과
#   ANDROID_KEYSTORE_PASSWORD — keystore 비밀번호
#   ANDROID_KEY_ALIAS         — 키 alias (예: terraworld)
#   ANDROID_KEY_PASSWORD      — 키 비밀번호
#
# Secrets 가 없으면 unsigned AAB 만 생성됨 (Play Store 업로드 불가).
# android/app/build.gradle 의 release buildType 에 signingConfig 도 설정되어 있어야 한다.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (선택)'
        required: false

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Android Release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capacitor sync (production)
        # NODE_ENV=production 으로 capacitor.config.ts 의 isDev 분기를 production
        # 으로 강제 → server.url 이 https://terraworld.app 로 sync, cleartext: false.
        # 이게 빠지면 release AAB 가 dev 호스트 (10.0.2.2:3000) 박힌 채 서명됨.
        env:
          NODE_ENV: production
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Compute version from tag / run number
        id: version
        run: |
          # versionCode 인코딩 정책 (Play Store 가 monotonic increase 강제)
          #   - tag (refs/tags/vMAJOR.MINOR.PATCH): MAJOR*1_000_000 + MINOR*1000 + PATCH
          #     → MINOR 0..999, PATCH 0..999 까지 안전 (이전 *10000+*100+ 공식은
          #     PATCH=100 시 MINOR+1 와 충돌). 또한 dispatch run 보다 항상 큰 값을
          #     보장하기 위해 +10_000_000 offset.
          #   - workflow_dispatch (no tag): GITHUB_RUN_NUMBER 그대로 — 단조증가.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_NAME="${GITHUB_REF#refs/tags/v}"
            MAJOR=$(echo "$VERSION_NAME" | cut -d. -f1)
            MINOR=$(echo "$VERSION_NAME" | cut -d. -f2)
            PATCH=$(echo "$VERSION_NAME" | cut -d. -f3 | cut -d- -f1)
            # 정수 검증 — semver 가 깨진 tag 가 push 되면 빌드 fail.
            if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
              echo "::error::malformed semver tag: $VERSION_NAME (expected vMAJOR.MINOR.PATCH integers)"
              exit 1
            fi
            if [[ "$MINOR" -gt 999 || "$PATCH" -gt 999 ]]; then
              echo "::error::MINOR or PATCH > 999 — versionCode encoding overflow ($VERSION_NAME)"
              exit 1
            fi
            VERSION_CODE=$((10000000 + MAJOR * 1000000 + MINOR * 1000 + PATCH))
          else
            VERSION_NAME="0.0.0+ci.${GITHUB_RUN_NUMBER}"
            VERSION_CODE="${GITHUB_RUN_NUMBER}"
          fi
          echo "ANDROID_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "::notice::APK versionCode=$VERSION_CODE versionName=$VERSION_NAME"

      - name: Check if keystore secret is configured
        id: keystore_check
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret 이 없어 unsigned AAB 만 생성됩니다."
          fi

      - name: Decode signing keystore (file only)
        if: steps.keystore_check.outputs.has_keystore == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # base64 decode 만 처리. password / alias 는 step-level env 로만 전파해서
          # subsequent step (artifact upload, action-gh-release 등) 에 누수 방지.
          mkdir -p android/app/keystore
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > android/app/keystore/release.keystore
          echo "ANDROID_KEYSTORE_FILE=keystore/release.keystore" >> "$GITHUB_ENV"

      - name: Build release AAB
        env:
          # 비밀번호 / alias 는 본 step 에서만 노출. $GITHUB_ENV 에 안 박힘.
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: cd android && ./gradlew bundleRelease

      - name: Locate AAB
        id: locate_aab
        run: |
          AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "aab_path=$AAB" >> "$GITHUB_OUTPUT"
          ls -lh "$AAB"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: ${{ steps.locate_aab.outputs.aab_path }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate_aab.outputs.aab_path }}
          # release_notes 는 attacker-controlled 가능 (workflow_dispatch) →
          # ${{ }} 직접 보간 대신 env 로 wrap 해 markdown injection 영향 최소화.
          # tag push 시에는 input 부재 → env 값 빈 문자열, generate_release_notes
          # 가 자동으로 changelog 생성.
          body: ${{ env.RELEASE_NOTES_BODY }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES_BODY: ${{ github.event.inputs.release_notes }}
