name: Mobile Release Build

# tag 가 v* 형식으로 push 되거나 수동 트리거 시 실행.
# Play Console 비공개 테스트 / 프로덕션 검수에 업로드할 서명 AAB 를 생성한다.
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   — `base64 -w0 terraworld-release.keystore` 결과
#   ANDROID_KEYSTORE_PASSWORD — keystore 비밀번호
#   ANDROID_KEY_ALIAS         — 키 alias (예: terraworld)
#   ANDROID_KEY_PASSWORD      — 키 비밀번호
#
# Secrets 가 없으면 unsigned AAB 만 생성됨 (Play Store 업로드 불가).
# android/app/build.gradle 의 release buildType 에 signingConfig 도 설정되어 있어야 한다.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (선택)'
        required: false

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Android Release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 실측: 기본 GITHUB_TOKEN 은 contents: write 없어 "Create GitHub Release"
    # 스텝이 403(Resource not accessible by integration)으로 실패 (v0.1.0 첫 릴리즈에서 확인).
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check if google-services secret is configured
        # if: 조건에서 secrets.* 를 직접 참조할 수 없어 (Unrecognized named-value: 'secrets')
        # keystore_check 와 동일하게 run: 스텝에서 확인 후 output 으로 넘긴다.
        # secret 값은 env: 로 전달 — ${{ }} 로 run 스크립트 본문에 직접 splice 하면
        # 값에 따옴표/개행이 있을 때 셸 파싱이 깨질 수 있다 (firebase_appdist_check 에서 실측).
        id: google_services_check
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "has_google_services=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_google_services=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode google-services.json (Firebase — FCM + App Distribution)
        if: steps.google_services_check.outputs.has_google_services == 'true'
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json
          # 부재 시 build.gradle 이 google-services 플러그인을 조건부로 건너뛰므로
          # (app/build.gradle:97-102) 이 secret 이 없어도 빌드 자체는 계속 진행된다.

      - name: Capacitor sync (production)
        # NODE_ENV=production 으로 capacitor.config.ts 의 isDev 분기를 production
        # 으로 강제 → server.url 이 production 도메인으로 sync, cleartext: false.
        # 이게 빠지면 release AAB 가 dev 호스트 (10.0.2.2:3000) 박힌 채 서명됨.
        env:
          NODE_ENV: production
          # 프로덕션 배포 도메인을 빌드타임 주입 (ios-release job 과 동일 — parity fix).
          # repo variable MOBILE_PROD_URL 미설정 시 capacitor.config.ts 의
          # terraworld.web-qplay.kr fallback 이 적용된다.
          MOBILE_PROD_URL: ${{ vars.MOBILE_PROD_URL }}
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Compute version from tag / run number
        id: version
        run: |
          # versionCode 인코딩 정책 (Play Store 가 monotonic increase 강제)
          #   - tag (refs/tags/vMAJOR.MINOR.PATCH): MAJOR*1_000_000 + MINOR*1000 + PATCH
          #     → MINOR 0..999, PATCH 0..999 까지 안전 (이전 *10000+*100+ 공식은
          #     PATCH=100 시 MINOR+1 와 충돌). 또한 dispatch run 보다 항상 큰 값을
          #     보장하기 위해 +10_000_000 offset.
          #   - workflow_dispatch (no tag): GITHUB_RUN_NUMBER 그대로 — 단조증가.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_NAME="${GITHUB_REF#refs/tags/v}"
            MAJOR=$(echo "$VERSION_NAME" | cut -d. -f1)
            MINOR=$(echo "$VERSION_NAME" | cut -d. -f2)
            PATCH=$(echo "$VERSION_NAME" | cut -d. -f3 | cut -d- -f1)
            # 정수 검증 — semver 가 깨진 tag 가 push 되면 빌드 fail.
            if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
              echo "::error::malformed semver tag: $VERSION_NAME (expected vMAJOR.MINOR.PATCH integers)"
              exit 1
            fi
            if [[ "$MINOR" -gt 999 || "$PATCH" -gt 999 ]]; then
              echo "::error::MINOR or PATCH > 999 — versionCode encoding overflow ($VERSION_NAME)"
              exit 1
            fi
            VERSION_CODE=$((10000000 + MAJOR * 1000000 + MINOR * 1000 + PATCH))
          else
            VERSION_NAME="0.0.0+ci.${GITHUB_RUN_NUMBER}"
            VERSION_CODE="${GITHUB_RUN_NUMBER}"
          fi
          echo "ANDROID_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "::notice::APK versionCode=$VERSION_CODE versionName=$VERSION_NAME"

      - name: Check if keystore secret is configured
        id: keystore_check
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret 이 없어 unsigned AAB 만 생성됩니다."
          fi

      - name: Decode signing keystore (file only)
        if: steps.keystore_check.outputs.has_keystore == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # base64 decode 만 처리. password / alias 는 step-level env 로만 전파해서
          # subsequent step (artifact upload, action-gh-release 등) 에 누수 방지.
          mkdir -p android/app/keystore
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > android/app/keystore/release.keystore
          echo "ANDROID_KEYSTORE_FILE=keystore/release.keystore" >> "$GITHUB_ENV"

      - name: Build release AAB + APK
        # APK 도 함께 빌드 — Firebase App Distribution 은 AAB 처리에 Play Console
        # 프로젝트 연결을 요구한다 ("This project is not linked to a Google Play
        # account", 실측). Play Console 미등록 상태이므로 테스터 배포는 APK 로,
        # Play 제출용 AAB 는 그대로 유지 (둘 다 같은 signingConfig 적용).
        env:
          # 비밀번호 / alias 는 본 step 에서만 노출. $GITHUB_ENV 에 안 박힘.
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: cd android && ./gradlew bundleRelease assembleRelease

      - name: Locate AAB
        id: locate_aab
        run: |
          AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "aab_path=$AAB" >> "$GITHUB_OUTPUT"
          ls -lh "$AAB"

      - name: Locate APK
        id: locate_apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          ls -lh "$APK"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: ${{ steps.locate_aab.outputs.aab_path }}
          retention-days: 30

      - name: Check if Firebase App Distribution is configured
        # 이 secret 은 raw JSON(따옴표/개행 포함) 이라 ${{ }} 직접 splice 시
        # `[: too many arguments` 로 셸 파싱이 깨진다 (실측) — env: 로 전달.
        # appId(변수)도 같이 확인 — secret 만 있고 변수가 없으면 appId 빈 값으로
        # 액션이 호출돼 실패한다.
        id: firebase_appdist_check
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_ANDROID_APP_ID: ${{ vars.FIREBASE_ANDROID_APP_ID }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ] && [ -n "$FIREBASE_ANDROID_APP_ID" ]; then
            echo "has_firebase_sa=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_firebase_sa=false" >> "$GITHUB_OUTPUT"
          fi

      # Firebase App Distribution — 일상 테스트 배포 채널 (iOS 는 TestFlight 유지, 여기선 Android 전용).
      # tag push 여부와 무관하게 매 실행마다 testers 그룹에 배포한다 (workflow_dispatch 로도 동작).
      # APK 배포 (AAB 아님 — 위 "Build release AAB + APK" 코멘트 참조).
      # continue-on-error: 이 스텝은 best-effort 테스터 배포 채널이라, 여기서 실패해도
      # 아래 "Create GitHub Release"(실제 태그 릴리스) 가 막히면 안 된다 (실측 리뷰 발견).
      - name: Distribute to Firebase App Distribution (testers)
        if: steps.firebase_appdist_check.outputs.has_firebase_sa == 'true'
        continue-on-error: true
        uses: wzieba/Firebase-Distribution-Github-Action@v1.7.1
        with:
          appId: ${{ vars.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: ${{ steps.locate_apk.outputs.apk_path }}
          releaseNotes: ${{ github.event.inputs.release_notes || format('tag {0}', github.ref_name) }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate_aab.outputs.aab_path }}
          # release_notes 는 attacker-controlled 가능 (workflow_dispatch) →
          # ${{ }} 직접 보간 대신 env 로 wrap 해 markdown injection 영향 최소화.
          # tag push 시에는 input 부재 → env 값 빈 문자열, generate_release_notes
          # 가 자동으로 changelog 생성.
          body: ${{ env.RELEASE_NOTES_BODY }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES_BODY: ${{ github.event.inputs.release_notes }}

  # ─────────────────────────────────────────────────────────────────────────
  # UltraPlan M15 — iOS Release (TestFlight 업로드)
  # ─────────────────────────────────────────────────────────────────────────
  # 필요한 GitHub Secrets:
  #   APPLE_API_KEY_ID         — App Store Connect API Key ID (10자, 예: ABCD1234EF)
  #   APPLE_API_ISSUER_ID      — Issuer ID (UUID)
  #   APPLE_API_KEY_P8_BASE64  — `base64 -w0 AuthKey_*.p8` 결과
  #   IOS_TEAM_ID              — Apple Developer Team ID (Universal Links 와 동일)
  #
  # Secrets 가 없으면 build only 모드 (TestFlight upload skip).
  # 본 job 은 runs-on: macos-latest 필수.
  ios-release:
    name: iOS Release (xcodebuild archive + TestFlight)
    runs-on: macos-latest
    timeout-minutes: 60
    # 본 job 은 macos runner 비용 큼 — tag push 시에만 실행 (workflow_dispatch 제외)
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install deps
        run: npm ci

      # Apple 은 iOS 26 SDK(Xcode 26+)로 빌드된 앱만 App Store Connect 업로드 허용.
      - name: Select Xcode 26 (iOS 26 SDK 필수)
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then
            echo "::error::Xcode 26 미설치 — 사용 가능:"; ls -d /Applications/Xcode_*.app || true; exit 1
          fi
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      - name: Capacitor sync (production)
        env:
          NODE_ENV: production
          # 프로덕션 배포 도메인(web-qplay.kr 서브도메인)을 빌드타임 주입.
          # repo variable MOBILE_PROD_URL 미설정 시 terraworld.web-qplay.kr fallback.
          MOBILE_PROD_URL: ${{ vars.MOBILE_PROD_URL }}
        run: npx cap sync ios

      - name: Extract version from tag
        id: ver
        # tag = v1.2.3 → MARKETING_VERSION=1.2.3, CURRENT_PROJECT_VERSION=run_number
        # SEC-206: Android tag 와 동일한 semver 검증 추가 (parity)
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # SEC-206 + Codex MEDIUM 2: `$` 끝 앵커로 pre-release tag (1.2.3-rc1) 차단.
          # Android 의 cut -d- -f1 패턴은 pre-release 허용 — 정책 차이 명시 (별 cycle 통일 권고).
          if ! [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::malformed semver tag for iOS: $TAG (expected MAJOR.MINOR.PATCH integers, no pre-release suffix)"
            exit 1
          fi
          echo "marketing=${TAG}" >> "$GITHUB_OUTPUT"
          echo "current_project=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Apply version (xcrun agvtool)
        working-directory: ios/App
        run: |
          xcrun agvtool new-marketing-version "${{ steps.ver.outputs.marketing }}"
          xcrun agvtool new-version -all "${{ steps.ver.outputs.current_project }}"

      - name: Verify secrets
        id: secrets_check
        run: |
          # ASC API key — TestFlight 업로드(altool) 인증에 필요.
          if [ -n "${{ secrets.APPLE_API_KEY_ID }}" ] && [ -n "${{ secrets.APPLE_API_ISSUER_ID }}" ] && [ -n "${{ secrets.APPLE_API_KEY_P8_BASE64 }}" ]; then
            echo "has_apple_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_apple_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning::APPLE_API_* secrets 부재 — build only 모드, TestFlight upload skip"
          fi
          # 고정 Distribution 인증서 + App Store provisioning profile — 서명에 필요.
          # 과거엔 -allowProvisioningUpdates 로 매 실행 인증서를 새로 발급 → ephemeral 러너라
          # 재사용 불가 → 계정 인증서 상한 소진(v0.1.7 실패). 이제 고정 인증서를 임포트해 재사용한다.
          if [ -n "${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}" ] \
             && [ -n "${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}" ] \
             && [ -n "${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}" ] \
             && [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "::warning::서명 시크릿 부재 — APPLE_DISTRIBUTION_CERT_P12_BASE64 / _PASSWORD / APPLE_PROVISIONING_PROFILE_BASE64 / APPLE_TEAM_ID 4개 모두 필요(build-only). 고정 인증서 셋업 필요."
          fi

      # tag 릴리스인데 서명 시크릿이 없으면 조용히 green 으로 끝내지 않고 명확히 실패시킨다
      # (silent no-op = "green 인데 TestFlight 에 아무것도 안 올라감" 오도 방지).
      - name: Require signing secrets (fail if not set up)
        if: steps.secrets_check.outputs.has_signing != 'true'
        run: |
          echo "::error::iOS 서명 시크릿 미설정 — TestFlight 릴리스 불가. 고정 Distribution 인증서 + App Store profile 셋업 필요(APPLE_DISTRIBUTION_CERT_P12_BASE64 / _PASSWORD / APPLE_PROVISIONING_PROFILE_BASE64 / APPLE_TEAM_ID)."
          exit 1

      - name: Decode Apple API key
        if: steps.secrets_check.outputs.has_apple_key == 'true'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$APPLE_API_KEY_P8" | base64 -d > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Import distribution certificate + provisioning profile
        if: steps.secrets_check.outputs.has_signing == 'true'
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          # ── 임시 keychain 에 고정 Distribution 인증서 임포트 (재사용 — 매 실행 새 발급 금지) ──
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"   # 임시 keychain 잠금 암호(빌드 한정, 영속 아님)
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"   # 빌드 중 자동 잠금 방지
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          printf '%s' "$CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$RUNNER_TEMP/cert.p12"
          # codesign 이 프롬프트 없이 키에 접근하도록 partition list 설정
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          # xcodebuild 가 이 keychain 을 찾도록 검색 목록에 추가(login keychain 유지)
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          # 인증서/개인키가 실제로 임포트됐는지 조기 검증 (잘못된 p12/비번을 archive 전에 잡는다)
          security find-identity -v -p codesigning "$KEYCHAIN"
          # ── App Store provisioning profile 설치 ──
          printf '%s' "$PROFILE_BASE64" | base64 -d > "$RUNNER_TEMP/app.mobileprovision"
          PROFILE_UUID="$(security cms -D -i "$RUNNER_TEMP/app.mobileprovision" | plutil -extract UUID raw -)"
          PROFILE_NAME="$(security cms -D -i "$RUNNER_TEMP/app.mobileprovision" | plutil -extract Name raw -)"
          # Xcode 16+ 는 신규 위치를, 구버전은 기존 위치를 읽는다 — 양쪽에 설치(UUID 파일명 = Xcode 규약).
          for PROFILE_DIR in "$HOME/Library/MobileDevice/Provisioning Profiles" \
                             "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            mkdir -p "$PROFILE_DIR"
            cp "$RUNNER_TEMP/app.mobileprovision" "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"
          done
          # archive/export 스텝이 참조하도록 profile 이름 전파
          echo "PROVISION_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "::notice::서명 준비 완료 — profile '$PROFILE_NAME' (UUID $PROFILE_UUID)"

      - name: Archive (xcodebuild)
        if: steps.secrets_check.outputs.has_signing == 'true'
        working-directory: ios/App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Manual signing — 임포트한 고정 Distribution 인증서 + App Store profile 을 재사용한다.
          # -allowProvisioningUpdates 를 쓰지 않는다(그게 매 실행 인증서를 새로 발급해 상한을 소진했다).
          # signed archive 여야 embedded framework(GoogleMobileAds 등)도 서명됨 → altool 90035 회피.
          # Capacitor 8 = SPM(비-CocoaPods) → App.xcworkspace 없음. -project App.xcodeproj.
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISION_PROFILE_NAME" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export IPA
        if: steps.secrets_check.outputs.has_signing == 'true'
        working-directory: ios/App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          # method=app-store + manual signing. 정적 부분은 quoted heredoc(리터럴), 동적 값(teamID/
          # profile 이름)은 PlistBuddy 로 삽입 — 문자열 연결 시 이름에 XML 특수문자(&,< 등)가 있으면
          # plist 가 깨지므로 PlistBuddy 로 안전하게 기록한다.
          cat > ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
          </dict>
          </plist>
          PLIST
          PB=/usr/libexec/PlistBuddy
          "$PB" -c "Add :teamID string $APPLE_TEAM_ID" ExportOptions.plist
          "$PB" -c "Add :provisioningProfiles dict" ExportOptions.plist
          "$PB" -c "Add :provisioningProfiles:app.terraworld.mobile string $PROVISION_PROFILE_NAME" ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight (xcrun altool)
        # IPA 는 has_signing 일 때만 생성되고, 업로드 인증은 API key(has_apple_key) 가 필요 — 둘 다 요구.
        if: steps.secrets_check.outputs.has_signing == 'true' && steps.secrets_check.outputs.has_apple_key == 'true'
        working-directory: ios/App
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          IPA=$(find build -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then echo "::error::IPA 미생성 — export 실패"; exit 1; fi
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID"

      - name: Upload IPA artifact (always)
        if: steps.secrets_check.outputs.has_signing == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: ios/App/build/*.ipa
          retention-days: 30
